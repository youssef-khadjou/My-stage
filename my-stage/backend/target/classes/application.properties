spring.application.name=My Stage Backend

spring.datasource.url=jdbc:mysql://localhost:3306/my_stage_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.auto_quote_keyword=true

server.port=8080

jwt.secret=mySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong12345
jwt.expiration=86400000