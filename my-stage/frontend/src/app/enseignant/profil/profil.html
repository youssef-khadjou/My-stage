<div class="profil-container">

  <nav class="navbar">
    <img src="univ_ufr.jpg" alt="Logo" class="logo">
    <div class="nav-liens">
      <a routerLink="/enseignant">Accueil</a>
      <a routerLink="/enseignant/profil">Infos personnelles</a>
      <a routerLink="/enseignant/calendrier">Calendrier</a>
      <a routerLink="/enseignant/suivis">Suivis</a>
      <a routerLink="/enseignant/soutenances">Soutenances</a>
    </div>
    <div class="user-zone">
      <div class="avatar">E.S</div>
      <div class="btn-deconnecter" (click)="deconnecter()" title="Se déconnecter">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </div>
    </div>
  </nav>

  <div class="contenu">

    <div class="carte-profil">

      <div class="avatar-grand">E.S</div>

      <div class="formulaire">

        <div class="rangee">
          <div class="champ">
            <label>Nom</label>
            <input type="text" [(ngModel)]="nom" placeholder="Votre nom">
          </div>
          <div class="champ">
            <label>Email</label>
            <input type="email" [(ngModel)]="email" placeholder="Votre email">
          </div>
        </div>

        <div class="rangee">
          <div class="champ">
            <label>Prénom</label>
            <input type="text" [(ngModel)]="prenom" placeholder="Votre prénom">
          </div>
          <div class="champ">
            <label>Mot de passe</label>
            <input type="password" [(ngModel)]="motDePasse" placeholder="••••••••">
          </div>
        </div>

        <div class="rangee">
          <div class="champ">
            <label>Sexe</label>
            <div class="radio-groupe">
              <label><input type="radio" [(ngModel)]="sexe" value="homme"> Homme</label>
              <label><input type="radio" [(ngModel)]="sexe" value="femme"> Femme</label>
            </div>
          </div>
          <div class="champ">
            <label>Département</label>
            <select [(ngModel)]="departement">
              <option value="">Choisir un département</option>
              <option value="miage">MIAGE</option>
              <option value="ingenierie">Ingénierie</option>
              <option value="les-deux">MIAGE & Ingénierie</option>
            </select>
          </div>
        </div>

        <p *ngIf="succes" style="color:green; margin-top:10px;">{{ succes }}</p>
        <p *ngIf="erreur" style="color:red; margin-top:10px;">{{ erreur }}</p>

      </div>

    </div>

    <div class="boutons">
      <button class="btn-annuler" routerLink="/enseignant">Annuler</button>
      <button class="btn-enregistrer" (click)="enregistrer()">Enregistrer</button>
    </div>

  </div>

  <footer class="footer">
    <div class="footer-liens">
      <a>À propos</a>
      <a>Contactez nous</a>
      <a>FAQ</a>
      <a>Termes et conditions</a>
      <a>Politique de cookies</a>
      <a>Confidentialité</a>
    </div>
    <p>Copyright © 2026 - My'Stage</p>
  </footer>

</div>
