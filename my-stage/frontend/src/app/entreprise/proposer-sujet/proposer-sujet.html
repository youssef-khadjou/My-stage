<div class="proposer-container">

  <nav class="navbar">
    <img src="univ_ufr.jpg" alt="Logo" class="logo">
    <div class="nav-liens">
      <a routerLink="/entreprise">Accueil</a>
      <a routerLink="/entreprise/profil">Infos personnelles</a>
      <a routerLink="/entreprise/proposer-sujet">Proposer un sujet</a>
      <a routerLink="/entreprise/propositions">Mes Propositions</a>
      <a routerLink="/entreprise/compte-rendu-visite">Compte rendu visite</a>
      <a routerLink="/entreprise/disponibilites">Mes Disponibilités</a>
    </div>
    <div class="user-zone">
      <div class="avatar">E.T</div>
      <div class="btn-deconnecter" (click)="deconnecter()" title="Se déconnecter">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </div>
    </div>
  </nav>

  <div class="contenu">

    <div class="carte-formulaire">

      <div class="colonne-gauche">
        <div class="champ-inline">
          <label>Titre du poste :</label>
          <input type="text" [(ngModel)]="titrePoste" placeholder="XXXXXXXXXX">
        </div>

        <div class="champ-inline">
          <label>Description :</label>
          <input type="text" [(ngModel)]="description" placeholder="XXXXXXXXXX">
        </div>
      </div>

      <div class="colonne-droite">
        <div class="champ-inline">
          <label>Durée :</label>
          <input type="text" [(ngModel)]="duree" placeholder="XXXXXXXXXX">
        </div>

        <div class="champ-inline">
          <label>Gratification :</label>
          <input type="text" [(ngModel)]="gratification" placeholder="XXXXXXXXXX">
        </div>

        <div class="champ-inline">
          <label>Compétences :</label>
          <input type="text" [(ngModel)]="competences" placeholder="XXXXXXXXXX">
        </div>

        <div class="champ-inline">
          <label>Télétravail :</label>
          <input type="text" [(ngModel)]="teletravail" placeholder="XXXXXXXXXX">
        </div>
      </div>

      <div class="zone-fichier">
        <label for="fichier" class="btn-fichier">Joindre fiche de poste</label>
        <input id="fichier" type="file" (change)="onFileSelected($event)" hidden>
        <span class="nom-fichier" *ngIf="fichierNom">{{ fichierNom }}</span>
      </div>

    </div>

    <p *ngIf="erreur" style="color: red; font-size: 13px;">{{ erreur }}</p>
    <p *ngIf="succes" style="color: green; font-size: 13px;">{{ succes }}</p>

    <div class="boutons">
      <button class="btn-annuler" routerLink="/entreprise">Annuler</button>
      <button class="btn-publier" (click)="publierOffre()">Publier l’offre</button>
    </div>

  </div>

  <footer class="footer">
    <div class="footer-liens">
      <a>À propos</a>
      <a>Contactez nous</a>
      <a>FAQ</a>
      <a>Termes et conditions</a>
      <a>Politique de cookies</a>
      <a>Confidentialité</a>
    </div>
    <p>Copyright © 2026 - My'Stage</p>
  </footer>

</div>
